# training-api backend (port 9899)
server:
  port: 9899
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  application:
    name: training-api
  datasource:
    url: jdbc:mysql://localhost:3306/training?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  redis:
    host: localhost
    port: 6379
    password:
    database: 1
    timeout: 5000
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.training.common.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

training:
  jwt:
    secret: training-platform-jwt-secret-key-2026-07-su-sheng-ji-ceng-wei-sheng
    expire: 604800000
  longcat:
    enabled: false
    api-key: YOUR_LONGCAT_API_KEY
    base-url: https://api.longcat.chat/openai
    model: LongCat-2.0
    max-tokens: 1000
    temperature: 0.7
    timeout-ms: 10000
    system-prompt: "你是一名基层卫生人员培训平台的智能助手，负责回答学员关于课程学习、考试报名、培训安排等问题。请用简洁、专业的中文回答，回答不超过500字。"

logging:
  level:
    root: info
    com.training: debug